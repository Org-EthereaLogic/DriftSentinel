# DriftSentinel Databricks Asset Bundle
# See: https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: driftsentinel

include:
  - "resources/*.yml"

# Local artifacts that must never be synced to the workspace bundle path.
# Workspace files are capped at 52428800 bytes per file; staged datasets and
# evidence dumps routinely exceed this. See specs/DS-PATCH-034 for rationale.
sync:
  exclude:
    - /data/
    - /evidence_pulled/
    - /archive_exports/
    - /orphaned_state_backup/
    - /report/
    - .venv/
    - "**/__pycache__/"
    - .pytest_cache/
    - .mypy_cache/
    - .ruff_cache/

variables:
  catalog:
    description: Existing Unity Catalog catalog name
  schema:
    description: Unity Catalog schema name
    default: default
  runtime_volume_name:
    description: Unity Catalog volume used for shared registry and evidence state
    default: driftsentinel_runtime

targets:
  dev:
    default: true
    mode: development
  prod:
    mode: production
