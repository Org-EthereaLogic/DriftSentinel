# DriftSentinel Drift Policy Template
#
# Copy this file and customize for each dataset's drift monitoring.
#
# Placeholders ${CATALOG}, ${SCHEMA}, and ${VOLUME} are resolved at load time
# when catalog=, schema=, or volume_name= are supplied to load_drift_policy().
# Omitting those arguments leaves the placeholders as literal strings.

drift_policy:
  name: example_drift_policy
  dataset: example_dataset
  contract_version: "1.0.0"
  policy_version: "1.0.0"

  monitored_columns:
    - column_name: amount
      method: shannon_entropy
    - column_name: category
      method: shannon_entropy

  baseline:
    source: trusted_load
    path: /Volumes/${CATALOG}/${SCHEMA}/baseline/example/
    table_name: ${CATALOG}.${SCHEMA}.example_baseline  # optional when format: table; use a fully qualified catalog.schema.table name
    format: csv
    read_options: {}  # optional override for baseline-specific reader options
    min_rows: 100

  gates:
    health_score_threshold: 0.70
    max_columns_failed: 2

  verdict_on_fail: block  # block | warn | log
