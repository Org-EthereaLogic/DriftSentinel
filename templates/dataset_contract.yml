# DriftSentinel Dataset Contract Template
#
# Copy this file and customize for each dataset you want to monitor.

dataset:
  name: example_dataset
  description: Replace with your dataset description
  catalog: example_catalog
  schema: default
  table: example_table
  contract_version: "1.0.0"

source:
  system: example_source
  format: csv  # csv, parquet, json, delta
  landing_path: /Volumes/example_catalog/default/landing/example/
  baseline_path: /Volumes/example_catalog/default/baseline/example/  # optional fallback for drift baseline

contract:
  required_columns:
    - column_name: id
      type: long
      nullable: false
    - column_name: event_date
      type: date
      nullable: false
    - column_name: amount
      type: double
      nullable: false
  business_key: [id]
  batch_identifier: batch_id
