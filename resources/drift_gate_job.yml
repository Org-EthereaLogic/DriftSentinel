resources:
  jobs:
    drift_gate_job:
      name: "driftsentinel_drift_gate"
      tasks:
        - task_key: run_drift_gate
          notebook_task:
            notebook_path: ../notebooks/04_run_drift_gate.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              dataset_id: "${var.dataset_id}"
              registry_path: "/Volumes/${var.catalog}/${var.schema}/${var.runtime_volume_name}/state/registry.json"
              drift_policy_path: "${var.drift_policy_path}"
              evidence_dir: "/Volumes/${var.catalog}/${var.schema}/${var.runtime_volume_name}/evidence"
              require_dataset_backed: "true"
