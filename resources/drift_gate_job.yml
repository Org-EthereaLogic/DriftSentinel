resources:
  jobs:
    drift_gate_job:
      name: "driftsentinel_drift_gate"
      parameters:
        - name: dataset_id
          default: ""
        - name: registry_path
          default: ""
        - name: drift_policy_path
          default: ""
        - name: evidence_dir
          default: ""
      tasks:
        - task_key: run_drift_gate
          notebook_task:
            notebook_path: ../notebooks/04_run_drift_gate.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              dataset_id: "{{job.parameters.dataset_id}}"
              registry_path: "{{job.parameters.registry_path}}"
              drift_policy_path: "{{job.parameters.drift_policy_path}}"
              evidence_dir: "{{job.parameters.evidence_dir}}"
              require_dataset_backed: "true"
