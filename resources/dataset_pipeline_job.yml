resources:
  jobs:
    dataset_pipeline_job:
      name: "driftsentinel_dataset_pipeline"
      tasks:
        - task_key: run_dataset_pipeline
          notebook_task:
            notebook_path: ../notebooks/07_run_dataset_pipeline.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              dataset_id: "${var.dataset_id}"
              registry_path: "/Volumes/${var.catalog}/${var.schema}/${var.runtime_volume_name}/state/registry.json"
              drift_policy_path: "${var.drift_policy_path}"
              policy_path: "${var.benchmark_policy_path}"
              evidence_dir: "/Volumes/${var.catalog}/${var.schema}/${var.runtime_volume_name}/evidence"
              seed: "${var.seed}"
              n_rows: "${var.n_rows}"
