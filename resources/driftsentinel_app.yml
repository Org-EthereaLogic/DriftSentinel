resources:
  apps:
    driftsentinel_app:
      name: driftsentinel
      description: DriftSentinel operator dashboard for dataset registry and evidence review
      source_code_path: ..
      resources:
        - name: runtime_volume
          uc_securable:
            securable_type: VOLUME
            securable_full_name: "${var.catalog}.${var.schema}.${var.runtime_volume_name}"
            permission: READ_VOLUME
        - name: dataset_pipeline_job
          job:
            id: "${resources.jobs.dataset_pipeline_job.id}"
            permission: CAN_MANAGE_RUN
      config:
        command:
          - gradio
          - app/app.py
        env:
          - name: RUNTIME_VOLUME_PATH
            value_from: runtime_volume
          - name: DATASET_PIPELINE_JOB_ID
            value_from: dataset_pipeline_job
          - name: DRIFTSENTINEL_ALLOWED_PATH_ROOTS
            value: ""
