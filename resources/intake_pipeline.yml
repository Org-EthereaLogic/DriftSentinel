resources:
  jobs:
    intake_pipeline:
      name: "driftsentinel_intake"
      parameters:
        - name: dataset_id
          default: ""
        - name: registry_path
          default: ""
        - name: evidence_dir
          default: ""
      tasks:
        - task_key: run_intake
          notebook_task:
            notebook_path: ../notebooks/03_run_intake_controls.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              dataset_id: "{{job.parameters.dataset_id}}"
              registry_path: "{{job.parameters.registry_path}}"
              evidence_dir: "{{job.parameters.evidence_dir}}"
              require_dataset_backed: "true"
