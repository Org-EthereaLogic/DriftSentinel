resources:
  jobs:
    benchmark_job:
      name: "driftsentinel_benchmark"
      parameters:
        - name: dataset_id
          default: ""
        - name: registry_path
          default: ""
        - name: drift_policy_path
          default: ""
        - name: benchmark_policy_path
          default: ""
        - name: evidence_dir
          default: ""
        - name: seed
          default: "42"
        - name: n_rows
          default: "10000"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/05_run_control_benchmark.py
            base_parameters:
              seed: "{{job.parameters.seed}}"
              n_rows: "{{job.parameters.n_rows}}"
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              dataset_id: "{{job.parameters.dataset_id}}"
              registry_path: "{{job.parameters.registry_path}}"
              drift_policy_path: "{{job.parameters.drift_policy_path}}"
              policy_path: "{{job.parameters.benchmark_policy_path}}"
              evidence_dir: "{{job.parameters.evidence_dir}}"
              require_dataset_backed: "true"
