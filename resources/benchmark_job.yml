resources:
  jobs:
    benchmark_job:
      name: "driftsentinel_benchmark"
      tasks:
        - task_key: run_benchmark
          notebook_task:
            notebook_path: ../notebooks/05_run_control_benchmark.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              seed: "42"
              n_rows: "1000"
              evidence_dir: "/tmp/driftsentinel_evidence"
